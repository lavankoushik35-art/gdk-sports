<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDK Sports Tournament</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f7fb;
  color:#222;
}

/* NAV */
nav{
  background:#0b0b0b;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  position:sticky;
  top:0;
  z-index:1000;
}

nav h1{
  color:gold;
  font-size:22px;
}

nav ul{
  display:flex;
  gap:18px;
  list-style:none;
}

nav ul li a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

nav ul li a:hover{
  color:gold;
}

/* HERO */
.hero{
  height:90vh;
  background:
  linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1521412644187-c49fa049e84d') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}

.hero h2{
  font-size:55px;
}

.hero p{
  font-size:18px;
  margin-top:10px;
  opacity:0.9;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:gold;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* SECTION */
section{
  padding:70px 20px;
  text-align:center;
}

h2{
  font-size:32px;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.card{
  background:white;
  padding:25px;
  width:220px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* FORM */
form{
  max-width:450px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#0b8f3a;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0a7a31;
}

/* FOOTER */
footer{
  background:#0b0b0b;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:30
